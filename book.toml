[book]
title = "Reasoning and Computation"
authors = ["Kevin Sullivan"]
language = "en"
description = "Logic and discrete mathematics formalized in Lean 4. A course text for CS 6501, University of Virginia."
src = "src"

[build]
build-dir = "book"

[output.html]
# Only include JS files that actually exist - remove or comment out missing ones
additional-js = [
    "assets/lean.min.js",
]
mathjax-support = true
git-repository-url = "https://github.com/kevinsullivan/DMT1F25"
# git-repository-icon = "fa-github" # Optional: adds GitHub icon


# Preprocessor configuration - order matters!
[preprocessor.toc]
command = "mdbook-toc"
renderer = ["html"]    # Specify renderer for consistency

[preprocessor.mermaid]
command = "mdbook-mermaid"
renderer = ["html"]

[preprocessor.image-size]
command = "mdbook-image-size"
renderer = ["html"]

# Optional: Add search functionality
# [output.html.search]
# enable = true
# limit-results = 30
# teaser-word-count = 30
# use-boolean-and = true
# boost-title = 2
# boost-hierarchy = 1
# boost-paragraph = 1
# expand = true
# heading-split-level = 3

# Optional: Improve print output
[output.html.print]
enable = true

