<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>2D Rational Affine Space</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      margin: 2rem;
      background: #fafafa;
      color: #333;
    }
    h1 { font-size: 1.4rem; margin-bottom: 0.3rem; }
    p  { font-size: 0.9rem; color: #666; max-width: 600px; }
    #viz { margin-top: 1rem; }
    svg { background: white; border: 1px solid #ddd; border-radius: 4px; }
    .point-circle { fill: #e74c3c; stroke: white; stroke-width: 1.5; }
    .point-label { font-size: 11px; fill: #c0392b; font-weight: 500; }
    .vector-line { stroke: #2980b9; stroke-width: 2; }
    .vector-label { font-size: 10px; fill: #2471a3; }
    .segment-line { stroke: #7f8c8d; stroke-width: 1.5; stroke-dasharray: 6,3; }
    .segment-medial { stroke: #27ae60; stroke-width: 1.2; stroke-dasharray: 4,4; }
    .segment-label { font-size: 10px; fill: #555; }
    .tooltip {
      position: absolute; padding: 6px 10px; background: rgba(0,0,0,0.8);
      color: white; border-radius: 4px; font-size: 12px; pointer-events: none;
      display: none;
    }
  </style>
</head>
<body>
  <h1>2D Rational Affine Space Visualization</h1>
  <p>Generated by Lean 4. Points, vectors, and line segments
     in a rational affine space &mdash; a torsor with no
     preferred origin or coordinate system. Hover over
     points to see displacements.</p>
  <div id="viz"></div>
  <div class="tooltip" id="tooltip"></div>

  <script>
    const W = 640, H = 640, margin = { top: 30, right: 30, bottom: 40, left: 40 };
    const width = W - margin.left - margin.right;
    const height = H - margin.top - margin.bottom;

    const svg = d3.select("#viz").append("svg")
      .attr("width", W).attr("height", H)
      .append("g")
      .attr("transform", `translate(${margin.left},${margin.top})`);

    // Arrow marker for vectors
    svg.append("defs").append("marker")
      .attr("id", "arrowhead")
      .attr("viewBox", "0 -5 10 10")
      .attr("refX", 8).attr("refY", 0)
      .attr("markerWidth", 8).attr("markerHeight", 8)
      .attr("orient", "auto")
      .append("path")
      .attr("d", "M0,-4L10,0L0,4Z")
      .attr("fill", "#2980b9");

    const tooltip = d3.select("#tooltip");

    render([
{"type":"point","label":"A","x":0.000000,"y":0.000000,"xExact":"0","yExact":"0"},
{"type":"point","label":"B","x":4.000000,"y":0.000000,"xExact":"4","yExact":"0"},
{"type":"point","label":"C","x":1.000000,"y":3.000000,"xExact":"1","yExact":"3"},
{"type":"point","label":"mid(A,B)","x":2.000000,"y":0.000000,"xExact":"2","yExact":"0"},
{"type":"point","label":"mid(B,C)","x":2.500000,"y":1.500000,"xExact":"(5 : Rat)/2","yExact":"(3 : Rat)/2"},
{"type":"point","label":"mid(A,C)","x":0.500000,"y":1.500000,"xExact":"(1 : Rat)/2","yExact":"(3 : Rat)/2"},
{"type":"vector","label":"B - A","x1":0.000000,"y1":0.000000,"x2":4.000000,"y2":0.000000},
{"type":"vector","label":"C - A","x1":0.000000,"y1":0.000000,"x2":1.000000,"y2":3.000000},
{"type":"segment","label":"AB","x1":0.000000,"y1":0.000000,"x2":4.000000,"y2":0.000000},
{"type":"segment","label":"BC","x1":4.000000,"y1":0.000000,"x2":1.000000,"y2":3.000000},
{"type":"segment","label":"CA","x1":1.000000,"y1":3.000000,"x2":0.000000,"y2":0.000000},
{"type":"segment","label":"medial","x1":2.000000,"y1":0.000000,"x2":2.500000,"y2":1.500000},
{"type":"segment","label":"medial","x1":2.500000,"y1":1.500000,"x2":0.500000,"y2":1.500000},
{"type":"segment","label":"medial","x1":0.500000,"y1":1.500000,"x2":2.000000,"y2":0.000000},
{"type":"point","label":"t=0.250000","x":0.250000,"y":0.750000,"xExact":"(1 : Rat)/4","yExact":"(3 : Rat)/4"},
{"type":"point","label":"t=0.333333","x":0.333333,"y":1.000000,"xExact":"(1 : Rat)/3","yExact":"1"},
{"type":"point","label":"t=0.666667","x":0.666667,"y":2.000000,"xExact":"(2 : Rat)/3","yExact":"2"},
{"type":"point","label":"t=0.750000","x":0.750000,"y":2.250000,"xExact":"(3 : Rat)/4","yExact":"(9 : Rat)/4"}
]);

    function render(data) {
      // Gather all x,y coords for domain computation
      const xs = [], ys = [];
      data.forEach(d => {
        if (d.type === "point") { xs.push(d.x); ys.push(d.y); }
        if (d.type === "vector" || d.type === "segment") {
          xs.push(d.x1, d.x2); ys.push(d.y1, d.y2);
        }
      });
      const pad = 0.8;
      const xMin = Math.floor(Math.min(...xs) - pad);
      const xMax = Math.ceil(Math.max(...xs) + pad);
      const yMin = Math.floor(Math.min(...ys) - pad);
      const yMax = Math.ceil(Math.max(...ys) + pad);

      const xScale = d3.scaleLinear().domain([xMin, xMax]).range([0, width]);
      const yScale = d3.scaleLinear().domain([yMin, yMax]).range([height, 0]);

      // Draw segments first (behind points)
      const segments = data.filter(d => d.type === "segment");
      svg.selectAll(".seg").data(segments).enter().append("line")
        .attr("class", d => d.label === "medial" ? "segment-medial" : "segment-line")
        .attr("x1", d => xScale(d.x1)).attr("y1", d => yScale(d.y1))
        .attr("x2", d => xScale(d.x2)).attr("y2", d => yScale(d.y2));

      // Draw vectors
      const vectors = data.filter(d => d.type === "vector");
      svg.selectAll(".vec").data(vectors).enter().append("line")
        .attr("class", "vector-line")
        .attr("x1", d => xScale(d.x1)).attr("y1", d => yScale(d.y1))
        .attr("x2", d => xScale(d.x2)).attr("y2", d => yScale(d.y2))
        .attr("marker-end", "url(#arrowhead)");

      svg.selectAll(".vlabel").data(vectors).enter().append("text")
        .attr("class", "vector-label")
        .attr("text-anchor", "end")
        .attr("x", d => xScale(d.x1) + (xScale(d.x2) - xScale(d.x1)) * 0.75 - 6)
        .attr("y", d => yScale(d.y1) + (yScale(d.y2) - yScale(d.y1)) * 0.75 - 6)
        .text(d => d.label);

      // Draw points (on top)
      const points = data.filter(d => d.type === "point");
      svg.selectAll(".pt").data(points).enter().append("circle")
        .attr("class", "point-circle")
        .attr("cx", d => xScale(d.x)).attr("cy", d => yScale(d.y))
        .attr("r", 5)
        .on("mouseover", (event, d) => {
          tooltip.style("display", "block")
            .html(`<b>${d.label}</b><br>x = ${d.xExact}<br>y = ${d.yExact}`)
            .style("left", (event.pageX + 12) + "px")
            .style("top", (event.pageY - 20) + "px");
        })
        .on("mouseout", () => tooltip.style("display", "none"));

      // Place labels with per-point positioning
      svg.selectAll(".plabel").data(points).enter().append("text")
        .attr("class", "point-label")
        .attr("text-anchor", d => {
          // mid(A,C) goes to the left to avoid interpolation labels on AC edge
          if (d.label === "mid(A,C)") return "end";
          return "start";
        })
        .attr("x", d => {
          if (d.label === "mid(A,C)") return xScale(d.x) - 8;
          if (d.label.startsWith("t=")) return xScale(d.x) + 14;
          return xScale(d.x) + 8;
        })
        .attr("y", d => yScale(d.y) - 8)
        .text(d => d.label);
    }
  </script>
</body>
</html>
